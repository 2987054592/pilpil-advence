spring:
  application:
    name: web
  datasource:
    url: jdbc:mysql://${host}:3306/pilpil?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&tinyInt1isBit=false&allowLoadLocalInfile=true&allowUrlInLocalInfile=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&allowPublicKeyRetrieval=true&
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  data:
    redis:
      host: ${host}
      port: 6379
  rabbitmq:
    host: ${host}
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
  elasticsearch:
    uris: http://${host}:9200
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB
server:
  port: 8080
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.pilpil.web.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      update-strategy: not_null
      id-type: assign_id
host: 192.168.150.102
knife4j:
  enable: true
aliyun :
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: javazou
    region : cn-beijing

